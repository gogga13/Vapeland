<div class="nav-search-shell">
    <div class="search-widget" data-search-widget data-search-url="{% url 'search_products' %}" data-catalog-url="{% url 'catalog_page' %}">
        <input
            type="search"
            class="search-input"
            placeholder="Пошук товарів..."
            autocomplete="off"
            value="{{ search_query|default:'' }}"
            aria-label="Пошук товарів"
        >
        <span class="search-widget-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.9"></circle>
                <path d="M16 16L21 21" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
            </svg>
        </span>
        <div class="search-dropdown" hidden style="display: none;"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('[data-search-widget]').forEach(function (widget) {
            if (widget.dataset.ready === '1') {
                return;
            }
            widget.dataset.ready = '1';

            const input = widget.querySelector('.search-input');
            const dropdown = widget.querySelector('.search-dropdown');
            const searchUrl = widget.dataset.searchUrl;
            const catalogUrl = widget.dataset.catalogUrl;
            let debounceTimer = null;
            let controller = null;

            const closeDropdown = function () {
                dropdown.hidden = true;
                dropdown.style.display = 'none';
                dropdown.innerHTML = '';
                widget.classList.remove('is-open');
            };

            const openDropdown = function () {
                dropdown.hidden = false;
                dropdown.style.display = 'grid';
                widget.classList.add('is-open');
            };

            const renderEmpty = function () {
                dropdown.innerHTML = '<div class="search-empty">Нічого не знайдено</div>';
                openDropdown();
            };

            const renderResults = function (items) {
                dropdown.innerHTML = '';

                if (!items.length) {
                    renderEmpty();
                    return;
                }

                items.forEach(function (item) {
                    const result = document.createElement('a');
                    result.className = 'search-result';
                    result.href = item.url;

                    const thumb = document.createElement('img');
                    thumb.className = 'search-thumb';
                    thumb.src = item.image;
                    thumb.alt = item.name;

                    const copy = document.createElement('div');
                    copy.className = 'search-copy';

                    const title = document.createElement('strong');
                    title.textContent = item.name;

                    const price = document.createElement('span');
                    price.className = 'search-price';
                    price.textContent = `${Number(item.price).toFixed(0)} грн`;

                    copy.appendChild(title);
                    copy.appendChild(price);
                    result.appendChild(thumb);
                    result.appendChild(copy);
                    dropdown.appendChild(result);
                });

                openDropdown();
            };

            input.addEventListener('input', function () {
                const query = input.value.trim();
                clearTimeout(debounceTimer);

                if (query.length < 2) {
                    if (controller) {
                        controller.abort();
                    }
                    closeDropdown();
                    return;
                }

                debounceTimer = setTimeout(function () {
                    if (controller) {
                        controller.abort();
                    }

                    controller = new AbortController();
                    fetch(`${searchUrl}?q=${encodeURIComponent(query)}`, { signal: controller.signal })
                        .then(function (response) {
                            if (!response.ok) {
                                throw new Error('Search request failed');
                            }
                            return response.json();
                        })
                        .then(function (data) {
                            renderResults(data.results || []);
                        })
                        .catch(function (error) {
                            if (error.name !== 'AbortError') {
                                closeDropdown();
                            }
                        });
                }, 300);
            });

            input.addEventListener('focus', function () {
                if (dropdown.children.length) {
                    openDropdown();
                }
            });

            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    const query = input.value.trim();
                    if (!query) {
                        return;
                    }
                    window.location.href = `${catalogUrl}?q=${encodeURIComponent(query)}`;
                }
            });

            document.addEventListener('click', function (event) {
                if (!widget.contains(event.target)) {
                    closeDropdown();
                }
            });
        });
    });
</script>
